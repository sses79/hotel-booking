name: Security

on:
  pull_request:
  push:
    branches: [main, dev]
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Audit NuGet dependencies
        run: dotnet list HotelBooking.slnx package --vulnerable --include-transitive
