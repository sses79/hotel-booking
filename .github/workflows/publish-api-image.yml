name: Publish API image

on:
  push:
    branches: [main]
    paths:
      - "src/HotelBooking.Api/**"
      - "src/HotelBooking.Models/**"
      - "src/HotelBooking.Repository/**"
      - "src/HotelBooking.Services/**"
      - ".dockerignore"
      - ".github/workflows/publish-api-image.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/hotel-booking-api

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/HotelBooking.Api/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

