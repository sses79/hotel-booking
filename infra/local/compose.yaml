name: hotel-booking

services:
  api:
    build:
      context: ../..
      dockerfile: src/HotelBooking.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__HotelBooking: "Server=sql,1433;Database=HotelBooking;User Id=sa;Password=${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env};Encrypt=True;TrustServerCertificate=True"
    ports:
      - "5080:8080"
    depends_on:
      sql:
        condition: service_healthy
    networks:
      - hotel-booking

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      HOME: /var/opt/mssql
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}
    working_dir: /var/opt/mssql
    ports:
      - "1433:1433"
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - sql-data:/var/opt/mssql
    networks:
      - hotel-booking

networks:
  hotel-booking:

volumes:
  sql-data:
